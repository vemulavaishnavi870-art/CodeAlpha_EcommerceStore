<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h1>Login</h1>
</header>

<main>

<form id="loginForm">

    <input
        type="email"
        id="email"
        placeholder="Enter Email"
        required
    >

    <br><br>

    <input
        type="password"
        id="password"
        placeholder="Enter Password"
        required
    >

    <br><br>

    <button type="submit">
        Login
    </button>

</form>

</main>

<script src="js/login.js"></script>

</body>
</html>
